name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    steps:
      - name: Merge Dependabot PR
        run: |
          PR_URL=$(gh api \
            "repos/$GITHUB_REPOSITORY/pulls?head=${{ github.event.workflow_run.head_repository.owner.login }}:${{ github.event.workflow_run.head_branch }}&state=open" \
            --jq '.[0].html_url')
          if [ -z "$PR_URL" ] || [ "$PR_URL" = "null" ]; then
            echo "No open PR found for this workflow run; skipping."
            exit 0
          fi
          gh pr merge --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
